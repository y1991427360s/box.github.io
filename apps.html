<script>

        description: '随手记下灵感、待办和片段想法，让零散信息有地方沉淀。',
        status: '持续迭代',
        tone: 'live',

        tags: ['Notes', '记录', '灵感']
    },
    {
        name: '目标',
        code: 'GO',

        status: '已上线',
        tone: 'live',
        href: 'task.html',
        cta: '立即打开',
        tags: ['Goals', '规划', '成长']
    },
    {
        name: '习惯',
        code: 'HB',
        description: '用更轻量的方式记录每天的小坚持，让长期变化被温和看见。',
        status: '即将推出',
        tone: 'soon',
        href: '',
        cta: '即将上线',
        tags: ['Habits', '自律', '日常']
    },
    {
        name: '清单',
        code: 'LS',
        description: '把反复出现的任务整理成稳定流程，减少遗忘、拖延与混乱。',
        status: '即将推出',
        tone: 'soon',
        href: '',
        cta: 'Coming Soon',
        tags: ['Lists', '流程', '效率']
    },
    {
        name: '记账',
        code: 'AC',
        description: '记录日常支出与消费节奏，慢慢建立自己的生活账本与判断。',
        status: '即将推出',
        tone: 'soon',
        href: '',
        cta: '即将上线',
        tags: ['Accounting', '消费', '生活']
    }
];

document.getElementById('appsGrid').innerHTML = appProducts.map(app => {
    const tags = app.tags.map(tag => `<span class="app-tag">${tag}</span>`).join('');
    const cta = app.tone === 'live'
        ? `<a href="${app.href}" class="app-cta">${app.cta}<span class="app-cta-arrow" aria-hidden="true">&rarr;</span></a>`

    return `
        <article class="app-card app-card-${app.tone}">
            <div class="app-card-top">

                <span class="app-code">${app.code}</span>
            </div>
            <div class="app-icon-wrap" aria-hidden="true">

            <div class="app-content">

            </div>
            <div class="app-tags">${tags}</div>
            <div class="app-card-footer">
                <span class="app-meta">${app.tone === 'live' ? '生活管理 / 效率工具' : 'Concept / In Progress'}</span>
                ${cta}
            </div>
        </article>
    `;
}).join('');

(function() {
    const bgm = document.getElementById('bgm');
    const btn = document.getElementById('bgmBtn');
    const STATE_KEY = 'senGlobalBgmState';
    const interactEvents = ['click','touchstart','pointerdown','keydown'];
    let saveTimer = null;

    function readState() {
        try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); }
        catch (e) { return {}; }
    }

    function writeState(partial) {
        const prev = readState();
        localStorage.setItem(STATE_KEY, JSON.stringify({ ...prev, ...partial, updatedAt: Date.now() }));
    }

    const savedState = readState();
    bgm.volume = typeof savedState.volume === 'number' ? savedState.volume : 0.35;

    function syncButtonState() { btn.classList.toggle('playing', !bgm.paused); }
    function persistPlaybackState() {
        writeState({ currentTime: bgm.currentTime || 0, paused: bgm.paused, volume: bgm.volume });
    }
    function startProgressSync() {
        if (saveTimer) clearInterval(saveTimer);
        saveTimer = setInterval(() => { if (!bgm.paused) persistPlaybackState(); }, 1000);
    }
    function stopProgressSync() {
        if (saveTimer) { clearInterval(saveTimer); saveTimer = null; }
    }
    function restoreTime() {
        const state = readState();
        if (typeof state.currentTime === 'number' && !Number.isNaN(state.currentTime)) {
            try { bgm.currentTime = state.currentTime; } catch (e) {}
        }
    }
    function tryAutoPlay() {
        const state = readState();
        if (state.paused === true) return;
        bgm.play().then(() => {
            syncButtonState();
            persistPlaybackState();
            startProgressSync();
            interactEvents.forEach(e => document.removeEventListener(e, tryAutoPlay, true));
        }).catch(() => {});
    }

    if (bgm.readyState >= 1) restoreTime();
    else bgm.addEventListener('loadedmetadata', restoreTime, { once: true });
    tryAutoPlay();
    interactEvents.forEach(e => document.addEventListener(e, tryAutoPlay, { capture: true }));

    btn.addEventListener('click', () => {
        if (!bgm.paused) {
            bgm.pause();
            syncButtonState();
            persistPlaybackState();
            stopProgressSync();
        } else {
            bgm.play().then(() => {
                syncButtonState();
                persistPlaybackState();
                startProgressSync();
                interactEvents.forEach(e => document.removeEventListener(e, tryAutoPlay, true));
            }).catch(() => {});
        }
    });

    bgm.addEventListener('pause', () => {
        syncButtonState();
        persistPlaybackState();
        stopProgressSync();
    });
    bgm.addEventListener('play', () => {
        syncButtonState();
        persistPlaybackState();
        startProgressSync();
    });
    bgm.addEventListener('ended', () => {
        writeState({ currentTime: 0, paused: false, volume: bgm.volume });
    });
    window.addEventListener('beforeunload', persistPlaybackState);
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) persistPlaybackState();
    });
    syncButtonState();
})();

(function() {
    var isMobile = 'ontouchstart' in window
        || navigator.maxTouchPoints > 0
        || window.innerWidth <= 1024;
    var cv = document.getElementById('fireworksCanvas');
    if (isMobile) {
        if (cv) cv.parentNode.removeChild(cv);
        return;
    }

    var c = cv.getContext('2d');
    var particles = [];
    var palette = ['#007AFF', '#5AC8FA', '#AF52DE', '#34C759', '#FFD60A', '#FF6B6B'];

    function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function burst(x, y) {
        var count = 24 + Math.floor(Math.random() * 12);
        for (var i = 0; i < count; i++) {
            var angle = Math.PI * 2 * i / count;
            var speed = 1.2 + Math.random() * 4.4;
            particles.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1,
                decay: 0.014 + Math.random() * 0.02,
                size: 1.8 + Math.random() * 3.2,
                color: palette[Math.floor(Math.random() * palette.length)]
            });
        }
    }

    document.addEventListener('click', function(e) {
        if (e.target.closest('input, textarea, button')) return;
        burst(e.clientX, e.clientY);
    }, true);

    function animate() {
        c.clearRect(0, 0, cv.width, cv.height);
        for (var i = particles.length - 1; i >= 0; i--) {
            var p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.986;
            p.vy = p.vy * 0.986 + 0.02;
            p.life -= p.decay;
            if (p.life <= 0) {
                particles.splice(i, 1);
                continue;
            }
            c.globalAlpha = p.life;
            c.beginPath();
            c.fillStyle = p.color;
            c.shadowBlur = 14;
            c.shadowColor = p.color;
            c.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            c.fill();
        }
        c.globalAlpha = 1;
        c.shadowBlur = 0;
        requestAnimationFrame(animate);
    }
    animate();
})();
</script>
</body>
</html>
